server:
  port: 8080

spring:
  application:
    name: nexora-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/nexora_db
    username: nexora
    password: nexora_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

nexora:
  cors:
    allowed-origins: http://localhost:3000
